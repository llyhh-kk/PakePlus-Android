<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kivotos AI - 完整语音助手</title>
    <style>
        :root {
            --bg: #1a1b2e;
            --bg2: #1e1f3a;
            --text: #f0e6ff;
            --text2: #b8b0d0;
            --pink: #ff6b9d;
            --blue: #5b9bd5;
            --purple: #9b59b6;
            --gold: #f0c060;
            --orange: #ffa726;
            --green: #5cdb95;
            --red: #ff6b6b;
            --border: #3a3b5c;
            --card: rgba(30, 31, 58, 0.85);
            --safe: env(safe-area-inset-bottom, 16px);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .top-bar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: nowrap;
        }
        .btn-menu {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .char-select {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4px 10px;
        }
        .char-emoji {
            font-size: 20px;
            flex-shrink: 0;
        }
        .char-info {
            flex: 1;
            min-width: 0;
        }
        .char-name {
            font-size: 13px;
            font-weight: 700;
        }
        .char-school {
            font-size: 9px;
            color: var(--text2);
        }
        .top-btn {
            padding: 5px 10px;
            border-radius: 14px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            border: none;
            color: #fff;
        }
        .top-btn.orange {
            background: var(--orange);
        }
        .top-btn.orange.off {
            background: var(--border);
            color: var(--text2);
        }
        .top-btn.purple {
            background: var(--purple);
        }
        .top-btn.purple.off {
            background: var(--border);
            color: var(--text2);
        }
        .top-btn.blue {
            background: var(--blue);
        }
        .top-btn.blue.activated {
            background: var(--green);
        }
        .top-btn.red {
            background: var(--red);
            animation: pulseRed 1s infinite;
        }
        .top-btn.red.hidden {
            display: none;
        }
        @keyframes pulseRed {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .welcome-msg {
            text-align: center;
            padding: 30px 16px;
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .wel-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }
        .wel-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wel-hint {
            color: var(--text2);
            font-size: 13px;
            margin-top: 6px;
        }
        .wel-command {
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid var(--pink);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            display: inline-block;
            font-size: 12px;
        }

        .msg-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            animation: msgIn 0.35s ease;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-row.self {
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .msg-row.self .msg-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .msg-row.other .msg-avatar {
            border: 2px solid var(--pink);
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.25);
        }
        .msg-bubble {
            max-width: 75%;
            position: relative;
        }

        .text-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }
        .msg-row.self .text-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-row.other .text-bubble {
            background: rgba(255, 107, 157, 0.1);
            border: 1px solid rgba(255, 107, 157, 0.15);
            border-bottom-left-radius: 4px;
        }

        /* ===== 语音气泡 - 简洁版 ===== */
        .voice-bubble {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 18px;
            cursor: pointer;
            position: relative;
            min-width: 70px;
        }
        .msg-row.self .voice-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-bottom-right-radius: 4px;
            flex-direction: row-reverse;
        }
        .msg-row.other .voice-bubble {
            background: rgba(255, 167, 38, 0.12);
            border: 1px solid rgba(255, 167, 38, 0.2);
            border-bottom-left-radius: 4px;
        }

        .voice-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        .vb-play-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: inherit;
            padding: 2px 4px;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .vb-play-btn.playing {
            color: var(--red);
            animation: pulseRed 0.8s infinite;
        }
        .voice-source-badge {
            font-size: 8px;
            padding: 1px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-left: 4px;
            flex-shrink: 0;
        }
        .voice-source-badge.edge {
            background: rgba(92, 219, 149, 0.2);
            color: var(--green);
        }
        .voice-source-badge.vits {
            background: rgba(91, 155, 213, 0.2);
            color: var(--blue);
        }
        .voice-source-badge.local {
            background: rgba(240, 192, 96, 0.2);
            color: var(--gold);
        }
        .voice-source-badge.custom {
            background: rgba(255, 167, 38, 0.2);
            color: var(--orange);
        }
        .voice-source-badge.mixed {
            background: rgba(155, 89, 182, 0.2);
            color: var(--purple);
        }

        /* 播放状态指示器 - 小圆点 */
        .voice-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .voice-dot.playing {
            background: var(--red);
            animation: pulseRed 0.6s infinite;
        }

        .image-container {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            max-width: 100%;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .image-container img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
            border-radius: 8px;
        }
        .image-container .image-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        .image-container .image-actions button {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .image-prompt {
            font-size: 10px;
            color: var(--text2);
            margin-top: 4px;
            opacity: 0.6;
        }

        .bottom-bar {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            padding-bottom: calc(8px + var(--safe));
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            background: rgba(26, 27, 46, 0.8);
            border: 2px solid var(--border);
            border-radius: 22px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-box:focus-within {
            border-color: var(--pink);
        }
        .input-box input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .input-box input::placeholder {
            color: var(--text2);
        }
        .btn-mic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-mic.recording {
            background: var(--red);
            color: #fff;
            animation: micPulse 1s infinite;
        }
        @keyframes micPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(255, 107, 107, 0);
            }
        }
        .btn-send {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .drawer-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .side-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 80vw;
            max-width: 300px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg2);
            z-index: 201;
            transform: translateX(-100%);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }
        .side-drawer.show {
            transform: translateX(0);
        }
        .drawer-head {
            padding: 20px 14px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .drawer-logo {
            font-size: 36px;
        }
        .drawer-title {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--pink), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .char-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .char-item.active {
            background: rgba(255, 107, 157, 0.1);
            border-color: var(--pink);
        }
        .char-item .ci-emoji {
            font-size: 28px;
        }
        .char-item .ci-name {
            font-size: 13px;
            font-weight: 600;
        }
        .char-item .ci-school {
            font-size: 10px;
            color: var(--text2);
        }
        .char-item .ci-source {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
        }
        .char-item .ci-source.edge {
            background: rgba(92, 219, 149, 0.2);
            color: var(--green);
        }
        .char-item .ci-source.vits {
            background: rgba(91, 155, 213, 0.2);
            color: var(--blue);
        }
        .char-item .ci-source.local {
            background: rgba(240, 192, 96, 0.2);
            color: var(--gold);
        }
        .char-item .ci-source.custom {
            background: rgba(255, 167, 38, 0.2);
            color: var(--orange);
        }
        .char-item .ci-source.mixed {
            background: rgba(155, 89, 182, 0.2);
            color: var(--purple);
        }
        .drawer-foot {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .btn-d {
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
        }
        .btn-d1 {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
        }
        .btn-d2 {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 250;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-sheet {
            background: var(--bg2);
            border-radius: 20px 20px 0 0;
            padding: 20px 16px;
            padding-bottom: calc(20px + var(--safe));
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-sheet h3 {
            text-align: center;
            font-size: 17px;
            margin-bottom: 16px;
            color: var(--pink);
        }
        .f-group {
            margin-bottom: 10px;
        }
        .f-group label {
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 3px;
        }
        .f-group input,
        .f-group select,
        .f-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(26, 27, 46, 0.8);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        .f-group textarea {
            min-height: 60px;
            resize: vertical;
        }
        .f-row {
            display: flex;
            gap: 8px;
        }
        .f-row .f-group {
            flex: 1;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .btn-m {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-m1 {
            background: var(--pink);
            color: #fff;
        }
        .btn-m2 {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }
        .toggle-row span {
            font-size: 13px;
        }
        .toggle-sw {
            width: 48px;
            height: 26px;
            background: var(--border);
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }
        .toggle-sw.on {
            background: var(--green);
        }
        .toggle-sw::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: left 0.3s;
        }
        .toggle-sw.on::after {
            left: 25px;
        }
        .hint {
            font-size: 10px;
            color: var(--text2);
            margin-top: 2px;
        }

        .voice-file-list {
            max-height: 120px;
            overflow-y: auto;
            background: rgba(26, 27, 46, 0.5);
            border-radius: 8px;
            padding: 6px;
            margin-top: 4px;
        }
        .voice-file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            margin: 2px 0;
            background: rgba(255, 255, 255, 0.03);
        }
        .voice-file-item .del-btn {
            background: var(--red);
            border: none;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            max-width: 80%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }

        @media (min-width: 768px) {
            .chat-area {
                max-width: 600px;
                margin: 0 auto;
            }
            .bottom-bar {
                max-width: 600px;
                margin: 0 auto;
                border-radius: 16px 16px 0 0;
            }
            .modal-sheet {
                max-width: 500px;
                border-radius: 20px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 抽屉 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-head">
            <span class="drawer-logo">🏫</span>
            <div class="drawer-title">学员名册</div>
        </div>
        <div class="drawer-list" id="drawerList"></div>
        <div class="drawer-foot">
            <button class="btn-d btn-d1" onclick="openCreateModal();closeDrawer();">✦ 招募新成员</button>
            <button class="btn-d btn-d2" onclick="openSettingsModal();closeDrawer();">⚙ 设置</button>
            <button class="btn-d btn-d2" onclick="clearChat();closeDrawer();">🗑 清空对话</button>
        </div>
    </div>

    <!-- 顶部 -->
    <div class="top-bar">
        <button class="btn-menu" onclick="openDrawer()">☰</button>
        <div class="char-select" onclick="openDrawer()">
            <span class="char-emoji" id="navEmoji">💙</span>
            <div class="char-info">
                <div class="char-name" id="navName">彩奈</div>
                <div class="char-school" id="navSchool">什亭之匣</div>
            </div>
        </div>
        <button class="top-btn blue" id="btnActivateVoice" onclick="activateVoice()">🎤 激活</button>
        <button class="top-btn orange" id="btnVoiceToggle" onclick="toggleVoice()">🎙 语音</button>
        <button class="top-btn purple" id="btnImageToggle" onclick="toggleImageGen()">🎨 画图</button>
        <button class="top-btn red hidden" id="btnStop" onclick="stopAudio()">⏹</button>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area" id="chatArea">
        <div class="welcome-msg" id="welcomeView">
            <span class="wel-emoji">💙</span>
            <h2 class="wel-name">彩奈</h2>
            <p class="wel-hint">🔊 支持 Edge AI / VITS / 自定义语音包</p>
            <p class="wel-hint">📱 iOS 请先点击顶部 <strong>"激活"</strong> 按钮</p>
            <div class="wel-command">🎨 输入 <strong>/画 描述</strong> 生成图片</div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="bottom-bar">
        <div class="input-row">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="说点什么... 或 /画 描述">
                <button class="btn-mic" id="btnMic" onclick="toggleRecord()">🎤</button>
            </div>
            <button class="btn-send" id="btnSend" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <!-- 创建角色 -->
    <div class="modal-overlay" id="createModal">
        <div class="modal-sheet">
            <h3>✦ 学员登记</h3>
            <div class="f-group">
                <label>头像</label>
                <div style="display:flex;flex-wrap:wrap;gap:6px;" id="emojiGrid"></div>
                <input type="hidden" id="fEmoji" value="💙">
            </div>
            <div class="f-row">
                <div class="f-group"><label>姓名*</label><input id="fName" placeholder="白子"></div>
                <div class="f-group"><label>学院</label><input id="fSchool" placeholder="阿比多斯"></div>
            </div>
            <div class="f-group"><label>性格设定*</label><textarea id="fPrompt" rows="3" placeholder="角色性格描述..."></textarea>
            </div>
            <div class="f-group">
                <label>🔊 语音来源</label>
                <select id="fVoiceSource" onchange="onVoiceSourceChange()">
                    <option value="edge">☁️ Edge AI 配音</option>
                    <option value="vits">🎯 VITS 通用接口</option>

        // ============ 语音播放 ============
        function speakText(text, speed, pitch) {
            return new Promise(function(resolve) {
                if (!isVoiceActivated) {
                    showToast('⚠️ 请先点击"激活"');
                    resolve();
                    return;
                }
                if (!window.speechSynthesis) {
                    showToast('❌ 不支持语音');
                    resolve();
                    return;
                }

                stopAudio();

                var clean = text.replace(/```[\s\S]*?```/g, '代码省略。')
                    .replace(/`([^`]+)`/g, '$1')
                    .replace(/\*\*(.*?)\*\*/g, '$1')
                    .replace(/\n{2,}/g, '。')
                    .replace(/\n/g, '，')
                    .substring(0, 300);

                if (!clean.trim()) { resolve(); return; }

                var utterance = new SpeechSynthesisUtterance(clean);
                utterance.lang = 'zh-CN';
                utterance.rate = Math.min(Math.max(speed || 1.0, 0.5), 2);
                utterance.pitch = Math.min(Math.max(pitch || 1.0, 0.5), 2);
                utterance.volume = 1;

                var voices = speechSynthesis.getVoices() || [];
                var zhVoices = voices.filter(function(v) { return v.lang && v.lang.startsWith('zh'); });
                var female = zhVoices.filter(function(v) {
                    var name = v.name || '';
                    return name.includes('Female') || name.includes('Xiaoxiao') || name.includes('Xiaoyi') || name.includes(
                        'Yunxi');
                });
                if (female.length > 0) utterance.voice = female[0];
                else if (zhVoices.length > 0) utterance.voice = zhVoices[0];
                else if (voices.length > 0) utterance.voice = voices[0];

                isPlaying = true;
                currentUtterance = utterance;
                updatePlayBtns(true);
                showStopButton(true);

                utterance.onstart = function() {
                    isPlaying = true;
                    updatePlayBtns(true);
                    showStopButton(true);
                };
                utterance.onend = function() {
                    isPlaying = false;
                    currentUtterance = null;
                    updatePlayBtns(false);
                    showStopButton(false);
                    resolve();
                };
                utterance.onerror = function(e) {
                    var err = e.error || '未知';
                    if (err === 'canceled' || err === 'interrupted') { resolve(); return; }
                    if (err === 'not-allowed') {
                        showToast('⚠️ 请点击"激活"按钮');
                        isVoiceActivated = false;
                        document.getElementById('btnActivateVoice').textContent = '🎤 激活';
                        document.getElementById('btnActivateVoice').classList.remove('activated');
                    }
                    isPlaying = false;
                    currentUtterance = null;
                    updatePlayBtns(false);
                    showStopButton(false);
                    resolve();
                };

                try { speechSynthesis.speak(utterance); } catch (e) {
                    showToast('⚠️ 播放失败');
                    isPlaying = false;
                    updatePlayBtns(false);
                    showStopButton(false);
                    resolve();
                }
            });
        }

        function stopAudio() {
            if (window.speechSynthesis) try { window.speechSynthesis.cancel(); } catch (e) {}
            currentUtterance = null;
            isPlaying = false;
            updatePlayBtns(false);
            showStopButton(false);
        }

        function showStopButton(show) {
            var btn = document.getElementById('btnStop');

        function updatePlayBtns(playing) {

        function handleVoiceFilesUpload(event) {
            var files = event.target.files;
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                if (!file.type.startsWith('audio/')) continue;
                if (file.size > 5 * 1024 * 1024) { showToast(file.name + ' 超过5MB'); continue; }
                var reader = new FileReader();
                reader.onload = function(e) {
                    tempVoiceFiles.push({
                        name: file.name,
                        dataUrl: e.target.result,
                        id: 'vf_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5)
                    });
                    renderVoiceFileList();
                };
                reader.readAsDataURL(file);

        function playCustomVoice(voiceFiles, playMode) {
            if (!voiceFiles || voiceFiles.length === 0) return null;
            var selectedFile;
            if (playMode === 'random') {
                selectedFile = voiceFiles[Math.floor(Math.random() * voiceFiles.length)];
            } else if (playMode === 'sequential') {
                var lastIndex = parseInt(localStorage.getItem('vp_last_index_' + currentId) || '0');
                var nextIndex = (lastIndex + 1) % voiceFiles.length;
                localStorage.setItem('vp_last_index_' + currentId, nextIndex.toString());
                selectedFile = voiceFiles[nextIndex];
            } else {
                selectedFile = voiceFiles[0];
            }
            if (selectedFile && selectedFile.dataUrl) {
                var audio = new Audio(selectedFile.dataUrl);
                audio.volume = 1.0;
                return audio;
            }
            return null;
        }

        function previewCustomVoice() {
            if (tempVoiceFiles.length === 0) { showToast('请先导入语音文件'); return; }
            stopAudio();
            var playMode = document.getElementById('fPlayMode').value;
            var audio = playCustomVoice(tempVoiceFiles, playMode);
            if (audio) {
                audio.onplay = function() { isPlaying = true;
                    updatePlayBtns(true); };
                audio.onended = function() { isPlaying = false;
                    updatePlayBtns(false); };
                audio.onerror = function() { isPlaying = false;

                audio.play();
            }
        }

        function generateImage(prompt, style) {
            if (!config.imageEnabled) return Promise.resolve(null);
            var provider = config.imageProvider || 'pollinations';
            var styleMap = {
                'anime': 'anime style, studio ghibli, vibrant colors',
                'realistic': 'photorealistic, 8k, highly detailed',
                'art': 'digital art, masterpiece, artistic',
                'game': 'game art, fantasy, rpg, concept art'
            };
            var fullPrompt = prompt + ', ' + (styleMap[style] || styleMap['anime']);

            return new Promise(function(resolve, reject) {
                switch (provider) {
                    case 'pollinations':
                        var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(fullPrompt) +
                            '?width=768&height=768&nologo=true&seed=' + Date.now();
                        var img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = function() { resolve(img.src); };
                        img.onerror = function() { reject(new Error('图片加载失败')); };
                        img.src = url;
                        break;
                    case 'huggingface':
                        var hfToken = config.hfToken;
                        if (!hfToken) { reject(new Error('请设置 HuggingFace Token')); return; }
                        fetch('https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-1', {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + hfToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ inputs: fullPrompt })
                        }).then(function(resp) {
                            if (!resp.ok) throw new Error('HuggingFace API 错误');
                            return resp.blob();
                        }).then(function(blob) {
                            var reader = new FileReader();
                            reader.onload = function() { resolve(reader.result); };
                            reader.onerror = function() { reject(new Error('读取失败')); };
                            reader.readAsDataURL(blob);
                        }).catch(function(e) { reject(e); });
                        break;
                    case 'replicate':
                        var rToken = config.replicateToken;
                        if (!rToken) { reject(new Error('请设置 Replicate Token')); return; }
                        fetch('https://api.replicate.com/v1/predictions', {
                            method: 'POST',
                            headers: { 'Authorization': 'Token ' + rToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ version: 'black-forest-labs/flux-schnell', input: { prompt: fullPrompt } })
                        }).then(function(resp) {
                            if (!resp.ok) throw new Error('Replicate API 错误');
                            return resp.json();
                        }).then(function(prediction) {
                            function checkStatus() {
                                fetch('https://api.replicate.com/v1/predictions/' + prediction.id, {
                                    headers: { 'Authorization': 'Token ' + rToken }
                                }).then(function(resp) { return resp.json(); }).then(function(data) {
                                    if (data.status === 'succeeded') {
                                        resolve(Array.isArray(data.output) ? data.output[0] : data.output);
                                    } else if (data.status === 'failed') {
                                        reject(new Error('生成失败'));
                                    } else {
                                        setTimeout(checkStatus, 1000);
                                    }
                                }).catch(function(e) { reject(e); });
                            }
                            checkStatus();
                        }).catch(function(e) { reject(e); });
                        break;
                    default:
                        reject(new Error('未知服务'));
                }
            });
        }

        // ============ 发送消息 ============
        function sendMsg() {
            var inp = document.getElementById('msgInput');
            var text = inp.value.trim();
            if (!text || isPlaying || isGeneratingImage) return;
            if (!config.apiKey) {
                showToast('请先设置 API Key');
                openSettingsModal();
                return;
            }
            inp.value = '';

            var agent = agents.find(function(a) { return a.id === currentId; });
            if (!agent) return;

            var imageMatch = text.match(/^\/画\s*(.+)/);
            if (imageMatch) {
                var prompt = imageMatch[1];
                var imageMsg = { role: 'assistant', content: '🎨 生成中: "' + prompt + '"', time: Date.now(),
                    generating: true };
                messages.push({ role: 'user', content: text, time: Date.now() });
                messages.push(imageMsg);
                renderMsgs();
                scrollBottom();

                isGeneratingImage = true;
                generateImage(prompt, config.imageStyle).then(function(imageUrl) {
                    if (imageUrl) {
                        imageMsg.content = '🎨 生成的图片: "' + prompt + '"';
                        imageMsg.imageUrl = imageUrl;
                        imageMsg.imagePrompt = prompt;
                        imageMsg.generating = false;
                        if (config.voiceMode && config.autoPlay) {
                            speak('这是根据"' + prompt + '"生成的图片', agent);
                        }
                    } else {
                        imageMsg.content = '❌ 生成失败';
                        imageMsg.generating = false;
                    }
                    isGeneratingImage = false;
                    renderMsgs();
                    scrollBottom();
                }).catch(function(e) {
                    imageMsg.content = '❌ 错误: ' + e.message;
                    imageMsg.generating = false;
                    isGeneratingImage = false;
                    renderMsgs();
                    scrollBottom();
                });
                return;
            }

            messages.push({ role: 'user', content: text, time: Date.now() });
            renderMsgs();
            scrollBottom();

            var genMsg = { role: 'assistant', content: '', time: Date.now(), generating: true };
            messages.push(genMsg);
            renderMsgs();
            scrollBottom();

            var sys = agent.prompt + '\n\n' + config.globalRule;
            var msgsToSend = messages.filter(function(m) { return !m.generating; }).slice(-10).map(function(m) {
                return { role: m.role, content: m.content };
            });

            fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + config.apiKey },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'system', content: sys }].concat(msgsToSend),
                    temperature: 0.7
                })
            }).then(function(resp) {
                if (!resp.ok) {
                    return resp.json().then(function(data) {
                        throw new Error(data.error ? data.error.message : 'API错误');
                    });
                }
                return resp.json();
            }).then(function(data) {
                var reply = data.choices[0].message.content;
                genMsg.content = reply;
                genMsg.generating = false;
                genMsg.played = false;
                renderMsgs();
                scrollBottom();

                if (config.voiceMode && config.autoPlay) {
                    speak(reply, agent).then(function() {
                        genMsg.played = true;
                        renderMsgs();
                    });
                }
            }).catch(function(e) {
                genMsg.content = '❌ 错误: ' + e.message;
                genMsg.generating = false;
                renderMsgs();
                showToast('❌ ' + e.message);
            });
        }

        function playVoiceMsg(index) {
            var msg = messages[index];
            if (!msg || msg.role !== 'assistant' || msg.generating) return;
            if (isPlaying) { stopAudio(); return; }
            var agent = agents.find(function(a) { return a.id === currentId; });
            speak(msg.content, agent);
            msg.played = true;
            renderMsgs();

        // ============ 渲染 - 简洁版语音气泡 ============
        function renderMsgs() {
            var area = document.getElementById('chatArea');
            if (messages.length === 0) {
                var agent = agents.find(function(a) { return a.id === currentId; });
                area.innerHTML =
                    '\n                    <div class="welcome-msg">\n                        <span class="wel-emoji">' + (agent ?
                        agent.emoji : '💙') + '</span>\n                        <h2 class="wel-name">' + (agent ? agent.name :
                        'AI') + '</h2>\n                        <p class="wel-hint">🔊 来源: ' + (agent ? getSourceLabel(agent
                            .voiceSource) : 'Edge AI') + '</p>\n                        <p class="wel-hint">📱 iOS 请先点击顶部 <strong>"激活"</strong></p>\n                        <div class="wel-command">🎨 输入 <strong>/画 描述</strong> 生成图片</div>\n                    </div>';
                return;
            }

            var html = '';
            for (var i = 0; i < messages.length; i++) {
                var m = messages[i];
                var agent = agents.find(function(a) { return a.id === currentId; });
                if (m.role === 'user') {
                    html += '<div class="msg-row self"><div class="msg-avatar">👤</div><div class="msg-bubble"><div class="text-bubble">' +
                        esc(m.content) + '</div></div></div>';
                } else if (m.generating) {
                    html += '<div class="msg-row other"><div class="msg-avatar">' + (agent ? agent.emoji : '🤖') +
                        '</div><div class="msg-bubble"><div class="text-bubble">🎙 生成中...</div></div></div>';
                } else {
                    var emoji = agent ? agent.emoji : '🤖';
                    var sourceLabels = {
                        'edge': 'Edge AI',
                        'vits': 'VITS',
                        'local': 'VITS本地',
                        'custom': '语音包',
                        'mixed': '混合'
                    };
                    var sourceClass = agent ? agent.voiceSource : 'edge';

                    html += '<div class="msg-row other"><div class="msg-avatar">' + emoji + '</div><div class="msg-bubble">';

                    // ===== 简洁语音气泡：只有播放按钮 + 来源标签 =====
                    html += '<div class="voice-bubble" onclick="playVoiceMsg(' + i + ')">';
                    html += '<span class="voice-icon">🔊</span>';
                    // 播放按钮
                    html +=
                        '<button class="vb-play-btn ' + (isPlaying ? 'playing' : '') + '" onclick="event.stopPropagation();playVoiceMsg(' +
                        i + ')">' + (isPlaying ? '⏸' : '▶') + '</button>';
                    // 播放状态小圆点
                    html += '<span class="voice-dot ' + (isPlaying ? 'playing' : '') + '"></span>';
                    // 来源标签
                    html += '<span class="voice-source-badge ' + sourceClass + '">' + (sourceLabels[sourceClass] ||
                        'Edge AI') + '</span>';
                    html += '</div>';

                    // 文字内容（由设置开关控制）
                    if (config.showText) {
                        html += '<div class="text-bubble" style="margin-top:4px;font-size:13px;opacity:0.85;">' + esc(m
                            .content) + '</div>';
                    }

                    // 图片
                    if (m.imageUrl) {
                        html +=
                            '<div class="image-container"><img src="' + m.imageUrl +
                            '" loading="lazy" onerror="this.style.display=\'none\'">' + (m.imagePrompt ?
                                '<div class="image-prompt">🎨 ' + m.imagePrompt + '</div>' : '') +
                            '<div class="image-actions"><button onclick="saveImage(this)">💾</button></div></div>';
                    }

                    html += '</div></div>';
                }
            }
            area.innerHTML = html;
        }

            config.apiKey = document.getElementById('sApiKey').value.trim();
            config.vitsUrl = document.getElementById('sVitsUrl').value.trim() || 'http://localhost:8000';
            config.imageProvider = document.getElementById('sImageProvider').value;
            config.hfToken = document.getElementById('sHfToken').value.trim();
            config.replicateToken = document.getElementById('sReplicateToken').value.trim();
            config.imageStyle = document.getElementById('sImageStyle').value;
            config.globalRule = document.getElementById('sGlobalRule').value.trim();
            saveAll();
            closeSettingsModal();
            updateUI();
            showToast('设置已保存');
        }

        function clearChat() {
            stopAudio();
            messages = [];
            renderMsgs();
            saveAll();
            showToast('对话已清空');
        }

        // ============ 数据持久化 ============
        function loadData() {
            var sc = localStorage.getItem('kv_vp_config_v9');
            if (sc) config = Object.assign({}, config, JSON.parse(sc));
            var sa = localStorage.getItem('kv_vp_agents_v9');
            if (sa) agents = JSON.parse(sa);
            var last = localStorage.getItem('kv_vp_last_v9');
            if (last && agents.find(function(a) { return a.id === last; })) currentId = last;
        }

        function saveAll() {
            localStorage.setItem('kv_vp_config_v9', JSON.stringify(config));
            localStorage.setItem('kv_vp_agents_v9', JSON.stringify(agents));
            localStorage.setItem('kv_vp_last_v9', currentId);
        }

        function updateUI() {
            var btn = document.getElementById('btnVoiceToggle');
            btn.textContent = config.voiceMode ? '🎙 语音' : '💬 文字';
            btn.className = 'top-btn orange' + (config.voiceMode ? '' : ' off');

            var imgBtn = document.getElementById('btnImageToggle');
            imgBtn.textContent = config.imageEnabled ? '🎨 画图' : '🚫 画图';
            imgBtn.className = 'top-btn purple' + (config.imageEnabled ? '' : ' off');

            document.getElementById('toggleVoiceMode').className = 'toggle-sw' + (config.voiceMode ? ' on' : '');
            document.getElementById('toggleAutoPlay').className = 'toggle-sw' + (config.autoPlay ? ' on' : '');
            document.getElementById('toggleShowText').className = 'toggle-sw' + (config.showText ? ' on' : '');
        }

        // ============ 初始化 ============
        function init() {
            loadData();
            populateVitsSpeakers();
            selectChar(currentId);
            renderDrawer();
            renderEmoji();
            updateUI();
            onImageProviderChange();
            onVoiceSourceChange();
            onLocalModeChange();

            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault();
                    sendMsg(); }
            });

            ['fSpeed', 'fPitch'].forEach(function(id) {
                document.getElementById(id).addEventListener('input', function() {
                    document.getElementById(id + 'Val').textContent = this.value + (id === 'fSpeed' ? 'x' : '');
                });
            });

            setTimeout(function() {
                if (!isVoiceActivated) {
                    var btn = document.getElementById('btnActivateVoice');
                    if (btn) btn.textContent = '🎤 激活';
                }
            }, 500);

            console.log('Kivotos AI 完整版已启动 (简洁语音气泡)');
        }

        // ============ 启动 ============
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // 暴露全局
        window.sendMsg = sendMsg;
        window.playVoiceMsg = playVoiceMsg;
        window.stopAudio = stopAudio;
        window.activateVoice = activateVoice;
        window.toggleVoice = toggleVoice;
        window.toggleImageGen = toggleImageGen;
        window.toggleSetting = toggleSetting;
        window.toggleRecord = toggleRecord;
        window.openDrawer = openDrawer;
        window.closeDrawer = closeDrawer;
        window.openCreateModal = openCreateModal;
        window.closeCreateModal = closeCreateModal;
        window.openSettingsModal = openSettingsModal;
        window.closeSettingsModal = closeSettingsModal;
        window.saveAgent = saveAgent;
        window.saveSettings = saveSettings;
        window.clearChat = clearChat;
        window.selectChar = selectChar;
        window.pickEmoji = pickEmoji;
        window.saveImage = saveImage;
        window.previewEdgeVoice = previewEdgeVoice;
        window.previewCustomVoice = previewCustomVoice;
        window.onVoiceSourceChange = onVoiceSourceChange;
        window.onLocalModeChange = onLocalModeChange;
        window.onImageProviderChange = onImageProviderChange;
        window.handleVoiceFilesUpload = handleVoiceFilesUpload;
        window.removeVoiceFile = removeVoiceFile;
        window.renderMsgs = renderMsgs;
    </script>
</body>
</html>
